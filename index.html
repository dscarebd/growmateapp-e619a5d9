<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Disable right-click
      document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
      // Disable text selection
      document.addEventListener('selectstart', function(e) { e.preventDefault(); });
      // Disable copy/cut/paste
      document.addEventListener('copy', function(e) { e.preventDefault(); });
      document.addEventListener('cut', function(e) { e.preventDefault(); });
      // Disable drag
      document.addEventListener('dragstart', function(e) { e.preventDefault(); });
      // Disable dev tools shortcuts
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') { e.preventDefault(); return; }
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) { e.preventDefault(); return; }
        if (e.ctrlKey && e.key === 'u') { e.preventDefault(); return; }
        if (e.ctrlKey && e.key === 's') { e.preventDefault(); return; }
        if (e.ctrlKey && e.key === 'a') { e.preventDefault(); return; }
        if (e.ctrlKey && e.key === 'c') { e.preventDefault(); return; }
        if (e.ctrlKey && e.key === 'x') { e.preventDefault(); return; }
      });
    </script>
  </body>
</html>
